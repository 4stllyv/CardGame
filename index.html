<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="levelSelect">
    <button onclick="setLevel(6, event)">EASY</button>
    <button onclick="setLevel(10, event)">NORMAL</button>
    <button onclick="setLevel(14, event)">HARD</button>

  </div>

  <div class="container">
    <div id="score">0.00</div>
    <div id="stage">
    </div>
    <a href="" id="restart" class="inactive">RESTART?</a>
  </div>

  <div id="clear">
   <div class="clear-box">
    <h1>🎉✨ CLEAR!! ✨🎉</h1>
    <p id="resultTime"></p>
    <button id="playAgain">もう一回</button>
   </div>
  </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
